<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0614">
  <title>Hell Gravity Dash 🔥 Jogo Infernal Anti-Gravidade</title>
  <meta name="description" content="Desvie de obstáculos infernais saltando no ar! Um jogo arcade dark cartoon viciante com um diabinho carismático.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div id="game-container">
    
    <!-- Mute Button -->
    <button id="mute-btn" title="Alternar som" aria-label="Alternar som">
      <svg id="unmute-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <svg id="mute-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none;">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>

    <!-- Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- ====== START SCREEN ====== -->
    <div id="start-screen" class="ui-screen active">
      <div class="start-top">
        <div class="logo-wrap">
          <div class="logo-fire-top">🔥</div>
          <h1 class="game-title">HELL<br><span>GRAVITY</span><br><em>DASH</em></h1>
          <div class="logo-fire-bottom">🔥</div>
        </div>
      </div>

      <div class="start-mid">
        <!-- Canvas renders the devil here -->
        <div class="devil-glow-ring"></div>
      </div>

      <div class="start-bottom">
        <button id="play-btn" class="btn-play" aria-label="Jogar">
          <span class="btn-icon">😈</span>
          <span class="btn-text">JOGAR</span>
        </button>
        
        <div class="instructions-card">
          <div class="instr-row">
            <span class="instr-icon">👆</span>
            <span>Toque, <strong>Espaço</strong> ou <strong>W / Seta Cima</strong> para pular</span>
          </div>
          <div class="instr-row">
            <span class="instr-icon">🎮</span>
            <span>Mova-se no ar com <strong>WASD</strong> ou <strong>Setas</strong></span>
          </div>
          <div class="instr-row">
            <span class="instr-icon">⚡</span>
            <span>Colete moedas e power-ups para resistir!</span>
          </div>
        </div>

        <div class="best-score-display" id="best-score-display">
          🏆 RECORDE: <span id="start-highscore">0</span>
        </div>
      </div>
    </div>

    <!-- ====== HUD ====== -->
    <div id="hud">
      <div class="hud-score-wrap">
        <div class="hud-label">PONTOS</div>
        <div class="hud-score" id="current-score">0</div>
      </div>
      <div class="hud-level-wrap">
        <div class="hud-label">NÍVEL</div>
        <div class="hud-level" id="current-level">1</div>
      </div>
      <div class="hud-coins-wrap">
        <span class="hud-coin-icon">💰</span>
        <div class="hud-coin-count" id="coin-count">0</div>
      </div>
    </div>

    <!-- Power-up Bar -->
    <div id="powerup-bar-container">
      <div id="powerup-label">⚡ POWER UP</div>
      <div id="powerup-track">
        <div id="powerup-bar"></div>
      </div>
    </div>

    <!-- ====== GAME OVER SCREEN ====== -->
    <div id="game-over-screen" class="ui-screen">
      <div class="go-title-wrap">
        <h1 class="game-over-title" id="go-title">WASTED</h1>
        <div class="go-subtitle" id="go-subtitle">O Inferno rejeitou você!</div>
      </div>

      <div class="results-card">
        <div class="result-row">
          <span class="result-label">🎯 PONTOS</span>
          <span class="result-value" id="final-score">0</span>
        </div>
        <div class="result-divider"></div>
        <div class="result-row highlight-row">
          <span class="result-label">🏆 RECORDE</span>
          <span class="result-value gold" id="final-highscore">0</span>
        </div>
        <div class="result-divider"></div>
        <div class="result-row">
          <span class="result-label">💰 MOEDAS</span>
          <span class="result-value" id="final-coins">0</span>
        </div>
      </div>

      <div class="go-buttons">
        <button id="restart-btn" class="btn-play" aria-label="Jogar novamente">
          <span class="btn-icon">🔥</span>
          <span class="btn-text">REJOGAR</span>
        </button>
      </div>

      <div class="new-record-badge" id="new-record-badge">
        ⭐ NOVO RECORDE! ⭐
      </div>
    </div>

    <!-- Combo floater -->
    <div id="combo-floater"></div>

  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
